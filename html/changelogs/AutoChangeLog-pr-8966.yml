author: "dageavtobusnick"
delete-after: True
changes:
  - add: "Теперь выбираемые модули устанавливаются в конкретную руку и выбираются только в нее. (PR #8966)"
  - add: "Теперь на ПКМ используются модули, установленные в правую руку, а на ЛКМ в левую. (PR #8966)"
  - tweak: "у РПД и РЦД на ПКМ теперь режим разбора / переработки. (PR #8966)"
  - tweak: "Кинетический крашер теперь выпускает метку на ПКМ и только на ПКМ. (PR #8966)"
  - tweak: "Теперь раскручивание отверткой машинерии, в которую можно помещать объекты(автолат, протолат, эксперементор) происходит на ПКМ. (PR #8966)"
  - tweak: "Теперь у контейнеров с реагентами передаваемое количество вбирается на ПКМ и только на ПКМ. (PR #8966)"
  - tweak: "Теперь можно прикручивать шкафы на ПКМ гаечным ключом. (PR #8966)"
  - tweak: "Теперь экшены включеных/выбраных модулей отображаются активными. Добавлена отметка о том, в какой руке модуль. (PR #8966)"
  - tweak: "Блокировка/разблокировка АПЦ для ии и боргов теперь происходит на ПКМ. (PR #8966)"
  - refactor: "Афтератаки приведены к единому набору входных параметров. (PR #8966)"
  - refactor: "Удален вызов цепочки атаки для перемещения объекта в инвентарь. теперь это делается напрямую вызовом прока. (PR #8966)"
  - refactor: "Почищены rpd_act. (PR #8966)"
  - refactor: "Поправлен стиль tooltip.html. (PR #8966)"
  - code_imp: "Добавлены недотстающие элементы цепочки атаки. В том числе и итем интерекшены. (PR #8966)"
  - del: "Удалены алерты снаряжения мехов. (PR #8966)"