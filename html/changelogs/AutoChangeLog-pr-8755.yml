changes:
  - balance: "теперь для снятия наручников, смирительной рубашки и болы требуется стоять смирно, однако сама система продолжает работать на новой системе таймеров (PR #8755)"
  - balance: "таймер итерации увеличен до 10 секунд (вместо 24 итераций по 5 секунд, теперь нужно 12 итераций по 10) (PR #8755)"
  - balance: "смирительная рубашка переведена под новую систему снятия наручников, таймер снятия повышен до 5 минут (PR #8755)"
  - balance: "теперь чтобы снять наручники требуется 2 минуты, вместо 2,5 минут (PR #8755)"