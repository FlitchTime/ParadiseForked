author: "dageavtobusnick"
delete-after: True
changes:
  - add: "Добавлено визуальное отображение подъема на объект. (PR #9223)"
  - add: "Добавлена возможность уложить в кровать покрывало, плюшевую игрушку и ядерный диск. (PR #9223)"
  - add: "Добавлена проверка на нахождение диска в безопасности. Долгое нахождение не в безопасности повышает шанс спавна лонопера. (PR #9223)"
  - refactor: "Телепортация ядерного диска теперь работает через компонент стейшенловинга. (PR #9223)"
  - refactor: "Смещения мобов переделаны на приватный список офсетов, обрабатываемый специальными проками. (PR #9223)"
  - refactor: "/Exit, /Exited и их сигналы приведены к единому набору аргументов. (PR #9223)"
  - refactor: "Клаймбинг переведен на компонент. (PR #9223)"