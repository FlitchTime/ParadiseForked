  - map: "Карты пощищены от атмосферных тайлов-префабов. (PR #8788)"
  - map: "Исправлена кривая лава в логове эшей. (PR #8788)"
  - code_imp: "Наличие атмосферного ID без статического атмоса теперь приравнивает состояние атмоса тайла к состоянию атмоферы. (PR #8788)"