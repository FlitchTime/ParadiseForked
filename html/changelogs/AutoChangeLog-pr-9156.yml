author: "littleboobs"
delete-after: True
changes:
  - balance: "Изменение параметров брони МОДа Капитана. (PR #9156)"
  - balance: "Время перезарядки адреналин импланта увеличено с 2 минут до 6 минут (в 3 раза). (PR #9156)"
  - balance: "Дрейфующему контрактнику добавлен имплант протоадреналина. (PR #9156)"
  - balance: "Контракторский хук имеет 3 секунды кнокдауна, вместо 2 секунд викена. (PR #9156)"
  - balance: "Щит теперь блокирует только в полусфере 180 градусов перед собой. (PR #9156)"
  - balance: "Обычный дизарм больше не работает лёжа. У БИ работает их особенный дизарм. (PR #9156)"
  - balance: "Стамина-дот (высасывание стамины в глеерах) прерывается при достижении стаминакрита. (PR #9156)"
  - balance: "Стартовый набор агента выдаётся теперь только, если у вас меньше 300 часов на спец. ролях. (PR #9156)"