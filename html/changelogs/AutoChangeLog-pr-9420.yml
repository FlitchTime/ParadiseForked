changes:
  - balance: "На станции ХЕК и Дрейк броня срезают свои характеристики в двое. По возвращению на Лазис, характеристики возвращаются. (PR #9420)"
  - balance: "Уменьшены различные параметры брони для: костяные наручи, костяной шлем, накидка из голиафа, капюшон накидки из голиафа, костяной гульфик, костяной талисман. (PR #9420)"