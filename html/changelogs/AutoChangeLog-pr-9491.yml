author: "dageavtobusnick"
delete-after: True
changes:
  - add: "Портированы картины с ТГ, а так же возможность их сохранения между раундами. Картины, находящиеся в рамке с категорией будут сохранены в конце раунда. (PR #9491)"
  - admin: "Добавлена панель для модерации сохраненных картин. (PR #9491)"
  - refactor: "Отрефакторен и унифицирован код клининга. (PR #9491)"
  - tweak: "Переработаны раковины и душ. Теперь вода в них конечная и восстанавливается со временем. (PR #9491)"
  - code_imp: "Добавлена техническая фозможность делать душ и раковину с разными реагентами. (PR #9491)"
  - add: "Портированы тайлы воды с ТГ(в том числе горячие источники) в игре не имплементированы. (PR #9491)"
  - add: "Добавлены удобные меню для выбора экрана ии и выбора картины заместо экрана. (PR #9491)"
  - add: "Добавлена консоль в библиотеку для печати сохраненных картин. (PR #9491)"