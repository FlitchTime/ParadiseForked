author: "dageavtobusnick"
delete-after: True
changes:
  - qol: "Добавлен алерт-индикатор на время активного парирования. (PR #9543)"
  - qol: "Добавлена возможность досрочно прервать парирование повторным нажатием. (PR #9543)"
  - bugfix: "Отремонтировано отражение снарядов v1 arm, а заодно и некоторых дугих предметов. (PR #9543)"
  - balance: "Теперь v1 arm требует вортекс ядро т3, а не любое, как раньше. (PR #9543)"
  - balance: "Щиты теперь ломаются от парирования, но на повреждение щита теперь влияет бронепробитие, а не сам урон. (PR #9543)"