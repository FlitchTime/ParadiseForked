changes:
  - experiment: "Добавлено удаление /tmp дирректории  при ините сабсистем и при их щатдауне, что возможно решит проблему зависаний в конце раунда. (PR #9530)"
  - experiment: "Эксперементальная оптимизация рендеринга лут панели. Добавлено кеширование тяжелых флат иконок по комплексным ключам + создание флат иконки заменено на iconforge версию. (PR #9530)"
  - code_imp: "Добавлена сабсистема server maint, отвечающая за реконнект игроков кик afk игроков и удаление tmp. (PR #9530)"
  - refactor: "Оптимизирован Life карбонов. Теперь вирусы и гены процессятся через сигналы, а генная нестабильность является статус эффектом. (PR #9530)"