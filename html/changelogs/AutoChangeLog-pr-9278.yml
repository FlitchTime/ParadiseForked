author: "littleboobs"
delete-after: True
changes:
  - admin: "Модерация Jukebox закрыта на флаг R_SOUNDS. (PR #9278)"
  - bugfix: "Голокарта теперь корректно обновляется сама по себе, а не только во время движения. (PR #9278)"
  - bugfix: "Голокарта СБ теперь снова работает. (PR #9278)"
  - bugfix: "Голокарта-импланты больше не мигают. (PR #9278)"
  - bugfix: "Стрельба в наручниках больше невозможна. (PR #9278)"
  - bugfix: "Нельзя суммонить туррель и стрелять из неё. (PR #9278)"
  - local: "Кравмагам прописан рунеймс. (PR #9278)"
  - bugfix: "Ящики с животными теперь не приходят пустыми. (PR #9278)"
  - bugfix: "Стрельба из ящиков больше невозможна. (PR #9278)"
  - bugfix: "Морф не становится невидимым, а также мыльным в некоторых случаях мимикрии. (PR #9278)"
  - tweak: "В высшей форме морф пропадает с худов во время засады. (PR #9278)"
  - tweak: "Морф теперь берёт density с объектов. (PR #9278)"
  - map: "Отключение эмбиенса и белого шума на Фастлоаде. (PR #9278)"
  - bugfix: "Исправлены способности Умбры и Тенелингов на погашение источников света. (PR #9278)"
  - bugfix: "Чемоданчик с фальшивым дном снова стреляет. (PR #9278)"