  - bugfix: "Оверлеи коллекторов. Затрата газа из канистры, пока коллектор выключен. (PR #9394)"
  - bugfix: "Подкручены значения диссипации энергии сингулярности, чтобы она не росла или не тухла сама по себе. (PR #9394)"
