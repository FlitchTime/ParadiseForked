changes:
  - add: "Электролиз газов теслой. (PR #9122)"
  - add: "Сингулярность может перемещаться между Z уровнями. (Боги культов тоже сингулярности) (PR #9122)"
  - add: "При засовывании БС сумку в БС сумку вызывается сразу мощная сингулярность с соответствующими эффектами. (PR #9122)"
  - add: "Сингулярность и боги теперь могут преследовать свои цели или маяки на других Z-уровнях. (PR #9122)"
  - balance: "Увеличение вырабатываемой коллекторами от сингулярности энергии в 2 раза, уменьшение вырабатываемой теслой энергии в 6 раз. (PR #9122)"
  - balance: "Добавлено скалирование производимо энергии коллектором, от количества молей плазмы в канистре. (PR #9122)"
  - admin: "Возможность добавить компонент сингулярности любому объекту через VV. (PR #9122)"